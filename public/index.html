<!DOCTYPE html>
<html lang="en">
<head>
    <title>Automated Quiz Generator - Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .btn-success { background-color: #27ae60; }
        .btn-success:hover { background-color: #219653; }
        #result { margin-top: 20px; }
        .error-msg { color: #e74c3c; font-size: 14px; margin-top: 10px; display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .logout-link { color: #e74c3c; text-decoration: none; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loginView" class="card">
        <h2 style="text-align: center;">📚 University Portal Login</h2>
        <p style="text-align: center; color: #7f8c8d; margin-bottom: 25px;">Enter your lecturer credentials to access your quiz dashboard.</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Lecturer ID (Username)</label>
                <input type="text" id="username" placeholder="e.g., admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="e.g., demo123" required>
            </div>
            <button type="submit">Secure Login</button>
            <p id="loginError" class="error-msg">Incorrect credentials. Try admin / demo123</p>
        </form>
    </div>

    <div id="dashboardView" class="card" style="display: none;">
        <div class="header-bar">
            <div>
                <h2>Welcome, <span id="lecturerName" style="color: #3498db;">Dr. Smith</span></h2>
                <p style="color: #7f8c8d; margin: 0;">Automated Quiz Generator Dashboard</p>
            </div>
            <a class="logout-link" onclick="logout()">Logout</a>
        </div>
        
        <form id="uploadForm">
            <div class="form-group">
                <label><strong>1. Upload Lecture Notes (PDF or TXT)</strong></label>
                <input type="file" id="fileInput" name="documents" accept=".pdf, .txt" multiple required>
            </div>
            <button type="submit" class="btn-success">Generate Quiz & Answer Key</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        // --- Login Logic ---
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Fake Authentication for the Demo
            if (user === 'admin' && pass === 'demo123') {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('dashboardView').style.display = 'block';
                document.getElementById('lecturerName').innerText = "Dr. Admin";
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        // --- Logout Logic ---
        function logout() {
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('loginForm').reset();
            document.getElementById('result').innerHTML = ''; // Clear previous quiz
            document.getElementById('loginError').style.display = 'none';
        }

        // --- Quiz Generation Logic (Your existing working code!) ---
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "<br>Processing files and generating NLP concepts... please wait ⏳";

            const formData = new FormData();
            const files = document.getElementById('fileInput').files;
            for(let i = 0; i < files.length; i++) {
                formData.append('documents', files[i]);
            }

            try {
                const response = await fetch('/api/generate', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.success) {
                    const cleanPreview = data.preview.map(q => ({ type: q.type, question: q.question, options: q.options }));
                    
                    resultDiv.innerHTML = `
                        <br>
                        <p style="color: green; font-weight: bold;">✅ ${data.message}</p>
                        <a href="${data.downloadUrl}" target="_blank" style="text-decoration: none;">
                            <button style="background-color: #28a745; width: auto;">📄 Download Printable Quiz (PDF)</button>
                        </a>
                        <hr style="margin-top: 25px;">
                        <h3>Preview of Generated Questions:</h3>
                        <pre style="background:#f4f4f4; padding:15px; border-radius:5px; overflow-x:auto; font-size: 12px;">${JSON.stringify(cleanPreview, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<p style="color:red;">Error: ${data.error}</p>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<p style="color:red;">Server connection failed.</p>`;
            }
        });
    </script>
</body>
</html>
