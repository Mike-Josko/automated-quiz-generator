<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Exam Generator - Portal</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        /* === GLOBAL MUST THEME === */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background-color 0.3s; }
        .bg-green { background-color: #f4f7f6; background-image: none; } 
        .bg-light { background-color: #f4f7f6; padding: 40px 0; background-image: none; }
        
        .card { width: 100%; max-width: 450px; padding: 35px 40px; box-sizing: border-box; border-radius: 4px; }
        .card.green-theme { background: #1cc665; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); border: none; }
        .card.light-theme { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 850px; }
        
        h2 { margin-top: 0; text-align: center; font-size: 24px; letter-spacing: 1px; }
        .green-theme h2 { color: white; font-weight: bold; }
        .light-theme h2 { color: #333; }
        hr { border: 0; border-top: 1px solid rgba(255, 255, 255, 0.5); margin: 25px 0; }
        .light-theme hr { border-top: 1px solid #ddd; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        .green-theme .form-group label { color: white; }
        .light-theme .form-group label { color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #00bcd4; border-radius: 2px; box-sizing: border-box; font-size: 15px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #ffca28; }

        .btn-primary { width: 100%; padding: 14px; background-color: #ffca28; color: black; border: none; border-radius: 2px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-primary:hover:not(:disabled) { background-color: #ffb300; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-secondary { width: 100%; padding: 14px; background-color: #ffb74d; color: white; border: none; border-radius: 2px; cursor: pointer; font-size: 16px; }
        .btn-secondary:hover { background-color: #ffa726; }
        .btn-dark { background-color: #003366; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block;}
        .btn-orange { background-color: #e67e22; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block;}

        .helper-text { color: white; display: block; margin-bottom: 12px; font-size: 15px; text-align: center; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .logout-link { color: #e74c3c; text-decoration: none; cursor: pointer; font-size: 14px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        th { padding: 12px; background: #f4f7f6; text-align: left; border-bottom: 2px solid #ddd; color: #333; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #555; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 4px; color: white; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; z-index: 1000; display: flex; align-items: center; gap: 10px;}
        .toast.success { background-color: #27ae60; border-left: 5px solid #1e8449; }
        .toast.error { background-color: #e74c3c; border-left: 5px solid #c0392b; }
        
        .step { display: flex; align-items: center; margin-bottom: 12px; color: #95a5a6; font-size: 15px; transition: 0.3s; }
        .step.active { color: #003366; font-weight: bold; }
        .step.completed { color: #27ae60; }
        .step-icon { width: 26px; height: 26px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 12px; font-size: 12px; background: #ecf0f1; transition: 0.3s;}
        .step.active .step-icon { background: #003366; color: white; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.2); }
        .step.completed .step-icon { background: #27ae60; color: white; }
        /* === THE MAGIC PRINT CSS === */
        @media print {
            body * { visibility: hidden; }
            .print-only, .print-only * { visibility: visible !important; display: block !important; }
            .print-only { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; box-sizing: border-box; background: white; }
            body { background-color: white; }
            .card { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Toast({ message, type }) {
            if (!message) return null;
            return (
                <div className={`toast ${type}`}>
                    <span>{type === 'success' ? '✅' : '❌'}</span>
                    {message}
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login'); 
            const [toastMsg, setToastMsg] = useState(null);

            useEffect(() => {
                fetch('/auth/me').then(res => res.json()).then(data => {
                    if (data.success) { setUser(data.user); document.body.className = 'bg-light'; } 
                    else { document.body.className = 'bg-green'; }
                });
            }, []);

            const showToast = (message, type = 'success') => {
                setToastMsg({ message, type });
                setTimeout(() => setToastMsg(null), 4000);
            };

            const handleLogout = async () => {
                await fetch('/auth/logout', { method: 'POST' });
                setUser(null); document.body.className = 'bg-green';
            };

            return (
                <div>
                    <Toast message={toastMsg ? toastMsg.message : null} type={toastMsg ? toastMsg.type : null} />
                    {user ? (
                        <Dashboard user={user} onLogout={handleLogout} showToast={showToast} />
                    ) : (
                        <div className="card green-theme">
                            {view === 'login' ? <LoginForm setView={setView} setUser={setUser} showToast={showToast} /> : <RegisterForm setView={setView} showToast={showToast} />}
                        </div>
                    )}
                </div>
            );
        }

        function LoginForm({ setView, setUser, showToast }) {
            const [username, setUsername] = useState(''); const [password, setPassword] = useState('');
            const onSubmit = async (e) => {
                e.preventDefault();
                const res = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                const data = await res.json();
                if (data.success) { setUser(data.user); document.body.className = 'bg-light'; showToast('Logged in successfully!', 'success'); } 
                else { showToast(data.message, 'error'); }
            };
            return (
                <div>
                    <h2>PORTAL LOGIN</h2><hr/>
                    <form onSubmit={onSubmit}>
                        <div className="form-group"><label>Email or Staff ID</label><input type="text" value={username} onChange={e => setUsername(e.target.value)} required /></div>
                        <div className="form-group"><label>Password</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} required /></div>
                        <button type="submit" className="btn-primary">Login</button>
                    </form>
                    <hr/><span className="helper-text">Click below to easily create an account</span>
                    <button className="btn-secondary" onClick={() => setView('register')}>REGISTER NEW LECTURER</button>
                </div>
            );
        }

        function RegisterForm({ setView, showToast }) {
            const [name, setName] = useState(''); 
            const [email, setEmail] = useState(''); 
            const [staffId, setStaffId] = useState('');
            const [school, setSchool] = useState('');
            const [department, setDepartment] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            const onSubmit = async (e) => {
                e.preventDefault();
                
                const staffIdRegex = /^MUST-(SFAS|SBE|SCI|SEA|SED|SHS|SoN|SPAS)-\d{4}$/;
                if (!staffIdRegex.test(staffId)) {
                    showToast('Invalid Staff ID! Use format: MUST-SCI-0042', 'error');
                    return; 
                }

                if (password.length < 8) {
                    showToast('Password is too short! It must be at least 8 characters.', 'error');
                    return; 
                }

                if (!school) {
                    showToast('Please select a School from the dropdown.', 'error');
                    return;
                }
                
                if (!department.trim()) {
                    showToast('Please enter your Department.', 'error');
                    return;
                }

                const payload = { name, email, staffId, school, department, password };

                try {
                    const res = await fetch('/auth/register', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(payload) 
                    });
                    const data = await res.json();
                    if (data.success) { showToast(data.message, 'success'); setView('login'); } 
                    else { showToast(data.message, 'error'); }
                } catch (error) {
                    showToast('Failed to connect to the server.', 'error');
                }
            };

            return (
                <div>
                    <h2>LECTURER REGISTRATION</h2><hr/>
                    <form onSubmit={onSubmit}>
                        <div style={{ display: 'flex', gap: '10px' }}>
                            <div className="form-group" style={{ flex: 1 }}><label>Full Name</label><input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Dr. Jane Smith" required /></div>
                            <div className="form-group" style={{ flex: 1 }}><label>Staff ID</label><input type="text" value={staffId} onChange={e => setStaffId(e.target.value)} placeholder="MUST-SCI-0042" required /></div>
                        </div>

                        <div className="form-group"><label>University Email</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="name@must.ac.ke" required /></div>
                        
                        <div className="form-group"><label>School</label>
                            <select value={school} onChange={e => setSchool(e.target.value)} required>
                                <option value="">Select a School...</option>
                                <option value="SFAS">School of Agriculture and Food Science</option>
                                <option value="SBE">School of Business and Economics</option>
                                <option value="SCI">School of Computing and Informatics</option>
                                <option value="SEA">School of Engineering and Architecture</option>
                                <option value="SED">School of Education</option>
                                <option value="SHS">School of Health Sciences</option>
                                <option value="SoN">School of Nursing</option>
                                <option value="SPAS">School of Pure and Applied Sciences</option>
                            </select>
                        </div>
                        <div className="form-group"><label>Department</label><input type="text" value={department} onChange={e => setDepartment(e.target.value)} placeholder="e.g., Computer Science" required /></div>

                        <div className="form-group">
                            <label>Secure Password</label>
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} required style={{ flex: 1 }} />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} style={{ padding: '0 15px', background: '#ecf0f1', border: '2px solid #bdc3c7', borderRadius: '2px', cursor: 'pointer', fontWeight: 'bold', color: '#34495e' }}>
                                    {showPassword ? "Hide" : "Show"}
                                </button>
                            </div>
                            
                            {password.length > 0 && 8 > password.length && (
                                <div style={{ fontSize: '13px', color: '#e74c3c', marginTop: '6px', fontWeight: 'bold' }}>❌ Must be at least 8 characters.</div>
                            )}
                            {password.length >= 8 && !(/[A-Z]/.test(password) && /\d/.test(password)) && (
                                <div style={{ fontSize: '13px', color: '#e67e22', marginTop: '6px', fontWeight: 'bold' }}>⚠️ Weak (but allowed). Consider adding numbers or uppercase letters.</div>
                            )}
                        </div>
                        
                        <button type="submit" className="btn-primary">Complete Registration</button>
                    </form>
                    <hr/><button className="btn-secondary" onClick={() => setView('login')}>BACK TO LOGIN</button>
                </div>
            );
        }
        // ==========================================
        // MERU UNIVERSITY SCHOOL & COURSE DIRECTORY
        // ==========================================
        const universityData = {
            "School of Computing and Informatics (SCI)": [
                "BSc Computer Science", "BSc Information Technology", "BSc Computer Technology", 
                "BSc Computer Security and Forensics", "BSc Information Science", "BSc Data Science", 
                "Bachelor of Business Information Technology (BBIT)", "Bachelor of Communication and Journalism", 
                "MSc Computer Science", "MSc Data Science", "MSc Information Technology", "PhD Computer Science"
            ],
            "School of Agriculture and Food Science (SAFS)": [
                "BSc Agriculture", "BSc Agribusiness Management", "BSc Agricultural Education and Extension", 
                "BSc Horticulture", "BSc Food Science and Technology", "BSc Food Science and Nutrition", 
                "BSc Food Science and Management", "BSc Animal Health and Production", "BSc Crop Protection", 
                "BSc Hospitality and Tourism", "MSc Food Science", "MSc Horticulture", "MSc Agriculture", 
                "PhD Agricultural Science", "PhD Food Science"
            ],
            "School of Business and Economics (SBE)": [
                "Bachelor of Commerce", "Bachelor of Business Administration", "Bachelor of Procurement and Logistics Management", 
                "Bachelor of Cooperative Management", "BSc Economics", "BSc Finance", "BSc Human Resource Management", 
                "BSc Applied Accounting", "BSc Economics and Statistics", "MBA", "MSc Entrepreneurship", "MSc Finance", 
                "MSc Supply Chain Management", "PhD Business Management"
            ],
            "School of Engineering and Architecture (SEA)": [
                "BTech Civil Engineering", "BTech Electrical and Electronic Engineering", "BTech Mechanical Engineering", 
                "BSc Architectural Studies", "BSc Sanitation and Waste Management", "MSc Sanitation", "PhD Sanitation and Waste Management"
            ],
            "School of Education (SED)": [
                "Bachelor of Education (Arts)", "BEd Science", "BEd Technology (Mechanical, Civil, Electrical)", 
                "Postgraduate Diploma in Education", "MEd Management and Leadership", "MEd Planning and Economics", "PhD Education"
            ],
            "School of Health Sciences (SHS)": [
                "BSc Public Health", "BSc Clinical Medicine and Community Health", "BSc Community Health", 
                "BSc Health Records and Information", "BSc Medical Laboratory Sciences", "BSc Medical Microbiology", 
                "BSc Nutrition and Dietetics", "MSc Medical Education", "MSc Public Health", "MSc Epidemiology", 
                "PhD Epidemiology", "PhD Molecular Medicine", "PhD Public Health"
            ],
            "School of Nursing (SON)": [
                "BSc Nursing", "BSc Midwifery", "BSc Health Systems Management", "MSc Nursing"
            ],
            "School of Pure and Applied Sciences (SPAS)": [
                "BSc Physics", "BSc Chemistry", "BSc Zoology", "BSc Botany", "BSc Mathematics", "BSc Mathematics and Physics", 
                "BSc Mathematics and Computer Science", "BSc Statistics", "BSc Actuarial Science", "BSc Biotechnology", 
                "BSc Biochemistry", "BSc Environmental Science", "BSc Physical and Biological Science", "PG Diploma in Applied Mathematics", 
                "PG Diploma in Applied Statistics", "PG Diploma in Pure Mathematics", "MSc Applied Mathematics", "MSc Applied Statistics", 
                "MSc Chemistry", "MSc Physics", "MSc Environmental Science", "MSc Entomology", "MSc Molecular Biology", "MSc Pure Mathematics", 
                "PhD Entomology", "PhD Mathematics"
            ],
            "Diploma Courses": [
                "Diploma in Electrical Engineering", "Diploma in Mechatronic Technology", "Diploma in Automotive Engineering", 
                "Diploma in Mechanical Production", "Diploma in Building Technician", "Diploma in Construction Management", 
                "Diploma in Civil Engineering", "Diploma in Water and Sanitation Engineering", "Diploma in Business Management", 
                "Diploma in Supply Chain Management", "Diploma in Project Management", "Diploma in Human Resource Management", 
                "Diploma in Marketing", "Diploma in ICT", "Diploma in Information Science", "Diploma in Agriculture", 
                "Diploma in Horticulture", "Diploma in Nutrition and Dietetics", "Diploma in Social Work", "Diploma in Environmental Science", 
                "Diploma in Catering and Accommodation", "Diploma in Fashion Design", "Diploma in Welding and Fabrication"
            ]
        };
        function Dashboard({ user, onLogout, showToast }) {
            const [result, setResult] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [loadingStep, setLoadingStep] = useState(0);
            const [viewMode, setViewMode] = useState('student');

            const [numQuestions, setNumQuestions] = useState(30);
            const [difficulty, setDifficulty] = useState('Mixed');
            const [qType, setQType] = useState('All');
            const [assessmentType, setAssessmentType] = useState('Final Exam');
            const [searchQuery, setSearchQuery] = useState('');
            // New states for Cascading Dropdowns
            const [selectedSchool, setSelectedSchool] = useState(Object.keys(universityData)[0]);
            const [availableCourses, setAvailableCourses] = useState(universityData[Object.keys(universityData)[0]]);
            const [selectedCourse, setSelectedCourse] = useState(universityData[Object.keys(universityData)[0]][0]);

            // Handler to instantly update courses when a school changes
            const handleSchoolChange = (e) => {
                const school = e.target.value;
                setSelectedSchool(school);
                setAvailableCourses(universityData[school]);
                setSelectedCourse(universityData[school][0]); // Auto-select the first course in the new list
            };
            // 1. Start with an empty vault for real Database fetching
            const [history, setHistory] = useState([]);

            // 2. Fetch the real history from MongoDB as soon as Dashboard loads
            useEffect(() => {
                fetch('/api/history')
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            setHistory(data.history);
                        }
                    })
                    .catch(err => console.error("Failed to fetch history:", err));
            }, []);

            const filteredHistory = history.filter(h => h.topic.toLowerCase().includes(searchQuery.toLowerCase()) || (h.date && h.date.includes(searchQuery)));

            const handleUpload = async (e) => {
                e.preventDefault();
                
                const fileInput = document.getElementById('fileInput');
                if (fileInput.files.length === 0) {
                    showToast('Please select a file.', 'error');
                    return;
                }
                if (fileInput.files.length > 15) {
                    showToast('Maximum of 15 files allowed per exam generation.', 'error');
                    return;
                }
                setIsGenerating(true); setLoadingStep(1); setResult(null);

                const stepInterval = setInterval(() => { setLoadingStep(prev => (prev < 3 ? prev + 1 : prev)); }, 1500);

                const formData = new FormData();
                Array.from(fileInput.files).forEach((file) => { formData.append('document', file); });
                formData.append('numQuestions', numQuestions); 
                formData.append('difficulty', difficulty); 
                formData.append('questionType', qType);
                formData.append('assessmentType', assessmentType);
                formData.append('courseCode', selectedCourse);

                try {
                    const res = await fetch('/api/generate-quiz', { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    clearInterval(stepInterval); setIsGenerating(false);

                    if (data.success) {
                        showToast(`${assessmentType} Generated Successfully!`, 'success');
                        setResult(data.quiz);
                        // We no longer manually push to history here, we rely on the Save button!
                    } else { 
                        showToast(data.message || 'Failed to generate quiz.', 'error'); 
                    }
                } catch (err) {
                    clearInterval(stepInterval); setIsGenerating(false); 
                    showToast('Server connection failed.', 'error');
                }
            };

            // ==========================================
            // LOGIC MOVED HERE: Safely above the return statement!
            // ==========================================
            const handleSaveToDatabase = async () => {
                try {
                    const res = await fetch('/api/history', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            topic: result.examTitle, // Uses the generated Title
                            count: numQuestions,
                            type: assessmentType,
                            quizData: result // Saves the entire edited exam structure!
                        })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        showToast('Exam safely locked in the database!', 'success');
                        // Add the newly saved exam to the top of the vault immediately
                        setHistory([data.savedExam, ...history]); 
                    } else {
                        showToast('Failed to save to database.', 'error');
                    }
                } catch (err) {
                    showToast('Server connection failed.', 'error');
                }
            };

            // ==========================================
            // EDITING HANDLERS
            // sIndex is Section Index (null if CAT), qIndex is Question Index
            // ==========================================
            const handleQuestionEdit = (sIndex, qIndex, field, value) => {
                const newResult = JSON.parse(JSON.stringify(result)); // Deep copy
                if (sIndex !== null) { newResult.sections[sIndex].questions[qIndex][field] = value; } 
                else { newResult.questions[qIndex][field] = value; }
                setResult(newResult);
            };

            const handleQuestionDelete = (sIndex, qIndex) => {
                const newResult = JSON.parse(JSON.stringify(result));
                if (sIndex !== null) { newResult.sections[sIndex].questions.splice(qIndex, 1); } 
                else { newResult.questions.splice(qIndex, 1); }
                setResult(newResult);
                showToast('Question deleted', 'success');
            };

            const handleQuestionAdd = (sIndex) => {
                const newResult = JSON.parse(JSON.stringify(result));
                const newQ = { questionNumber: "?", questionText: "Type your new question here...", marks: 2, markingGuide: "Type marking guide here..." };
                if (sIndex !== null) { newResult.sections[sIndex].questions.push(newQ); } 
                else { newResult.questions.push(newQ); }
                setResult(newResult);
                showToast('Blank question added', 'success');
            };

            return (
                <div className="card light-theme" style={{margin: '0 auto'}}>
                    <div className="header-bar">
                        <div>
                            <h2>Welcome, <span style={{color: '#1cc665'}}>{user.name}</span></h2>
                            <p style={{color: '#7f8c8d', margin: 0}}>Automated Assessment Dashboard</p>
                        </div>
                        <a className="logout-link" onClick={onLogout}>Logout</a>
                    </div>

                    <form onSubmit={handleUpload}>
                        <div className="form-group">
                            <label>1. Upload Lecture Notes (PDF or TXT)</label>
                            <input type="file" id="fileInput" accept=".pdf, .txt" multiple required style={{border: '1px solid #ccc', background: '#f9f9f9', padding: '10px'}}/>
                        </div>

                        <div style={{background: '#f4f7f6', padding: '15px', borderRadius: '4px', border: '1px solid #ddd', marginBottom: '20px'}}>
                            <label style={{color: '#333', marginBottom: '10px', display: 'block'}}>2. Exam Configuration</label>
                            {/* NEW ROW: School & Course Validation */}
                                <div style={{display: 'flex', gap: '15px', flexWrap: 'wrap', marginBottom: '15px'}}>
                                    <div className="form-group" style={{flex: 1, minWidth: '250px', marginBottom: 0}}>
                                        <label style={{fontSize: '13px', color: '#555', fontWeight:'bold'}}>Select School</label>
                                        <select value={selectedSchool} onChange={handleSchoolChange} style={{padding: '8px', border:'1px solid #ccc', width: '100%', boxSizing: 'border-box', backgroundColor: '#fff', fontWeight: 'bold', color: '#2c3e50'}}>
                                            {Object.keys(universityData).map(school => (
                                                <option key={school} value={school}>{school}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="form-group" style={{flex: 1, minWidth: '250px', marginBottom: 0}}>
                                        <label style={{fontSize: '13px', color: '#555', fontWeight:'bold'}}>Select Department/Course</label>
                                        <select value={selectedCourse} onChange={(e) => setSelectedCourse(e.target.value)} style={{padding: '8px', border:'1px solid #ccc', width: '100%', boxSizing: 'border-box', backgroundColor: '#f9f9f9'}}>
                                            {availableCourses.map(course => (
                                                <option key={course} value={course}>{course}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>
                            <div style={{display: 'flex', gap: '15px', flexWrap: 'wrap'}}>
                                
                                {/* 1. Total Marks */}
                                <div className="form-group" style={{flex: 1, minWidth: '120px', marginBottom: 0}}>
                                    <label style={{fontSize: '13px', color: '#555', fontWeight:'normal'}}>Total Marks Target</label>
                                    <input type="number" value={numQuestions} onChange={e => setNumQuestions(e.target.value)} min="10" max="100" style={{padding: '8px', border:'1px solid #ccc', width: '100%', boxSizing: 'border-box'}}/>
                                </div>

                                {/* 2. Difficulty Level */}
                                <div className="form-group" style={{flex: 1, minWidth: '120px', marginBottom: 0}}>
                                    <label style={{fontSize: '13px', color: '#555', fontWeight:'normal'}}>Difficulty Level</label>
                                    <select value={difficulty} onChange={e => setDifficulty(e.target.value)} style={{padding: '8px', border:'1px solid #ccc', width: '100%', boxSizing: 'border-box'}}>
                                        <option value="Mixed">Mixed Difficulty</option>
                                        <option value="Easy">Easy (Basic Recall)</option>
                                        <option value="Medium">Medium (Application)</option>
                                        <option value="Hard">Hard (Deep Analysis)</option>
                                    </select>
                                </div>

                                {/* 3. Assessment Type */}
                                <div className="form-group" style={{flex: 1, minWidth: '120px', marginBottom: 0}}>
                                    <label style={{fontSize: '13px', color: '#555', fontWeight:'normal'}}>Assessment Type</label>
                                    <select value={assessmentType} onChange={e => setAssessmentType(e.target.value)} style={{padding: '8px', border:'1px solid #ccc', width: '100%', boxSizing: 'border-box'}}>
                                        <option value="Final Exam">Final Exam (Sections A-D)</option>
                                        <option value="CAT">CAT / RAT (Flat Quiz)</option>
                                    </select>
                                </div>

                            </div>
                        </div>

                        <button type="submit" className="btn-primary" style={{backgroundColor: isGenerating ? '#7f8c8d' : '#003366', color: 'white'}} disabled={isGenerating}>
                            {isGenerating ? <span><span className="spinner"></span> Reading Docs & Formatting...</span> : 'Generate Assessment'}
                        </button>
                    </form>

                    {isGenerating && (
                        <div style={{ marginTop: '20px', padding: '20px', background: 'white', borderRadius: '4px', border: '1px dashed #ccc' }}>
                            <div className={`step ${loadingStep >= 1 ? (loadingStep > 1 ? 'completed' : 'active') : ''}`}><div className="step-icon">{loadingStep > 1 ? '✓' : '1'}</div> Reading Documents & Extracting Text...</div>
                            <div className={`step ${loadingStep >= 2 ? (loadingStep > 2 ? 'completed' : 'active') : ''}`}><div className="step-icon">{loadingStep > 2 ? '✓' : '2'}</div> Analyzing Core Syllabus Concepts...</div>
                            <div className={`step ${loadingStep >= 3 ? 'active' : ''}`}><div className="step-icon">{loadingStep > 3 ? '✓' : '3'}</div> Formatting Exam Structure...</div>
                        </div>
                    )}

                    <div style={{marginTop: '20px'}}>
                        {result && (
                            <div style={{ animation: 'slideIn 0.5s ease-out' }}>
                                
                                {/* THE WORKING DOWNLOAD BUTTONS */}
                                <div className="no-print" style={{display: 'flex', gap: '10px', flexWrap: 'wrap', marginBottom: '20px'}}>
                                    <button type="button" onClick={(e) => { e.preventDefault(); window.print(); }} className="btn-dark" style={{ textDecoration: 'none' }}>
                                        📄 Download Printable Exam (PDF)
                                    </button>
                                    <button type="button" onClick={(e) => {
                                        e.preventDefault();
                                        const element = document.createElement("a");
                                        const file = new Blob([JSON.stringify(result, null, 2)], {type: 'text/plain'});
                                        element.href = URL.createObjectURL(file);
                                        element.download = "moodle_export.txt";
                                        document.body.appendChild(element);
                                        element.click();
                                        document.body.removeChild(element);
                                    }} className="btn-orange" style={{ textDecoration: 'none' }}>
                                        🎓 Download for Moodle (LMS)
                                    </button>
                                </div>

                                {/* ========================================== */}
                                {/* THE INVISIBLE PRINT TEMPLATE (Formal Paper)*/}
                                {/* ========================================== */}
                                <div className="print-only" style={{ display: 'none', fontFamily: '"Times New Roman", Times, serif', color: 'black', lineHeight: '1.6' }}>
                                    <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                                        <h2 style={{ margin: '0', fontSize: '20px', fontWeight: 'bold' }}>MERU UNIVERSITY OF SCIENCE AND TECHNOLOGY</h2>
                                        <p style={{ margin: '2px 0', fontSize: '14px' }}>P.O. Box 972-60200 - Meru-Kenya</p>
                                        <br/>
                                        <h3 style={{ margin: '0', fontSize: '18px', fontWeight: 'bold' }}>University Examinations 2025/2026</h3>
                                    </div>
                                    <div style={{ marginBottom: '20px', fontSize: '14px', fontWeight: 'bold' }}>
                                        <p style={{ margin: '5px 0' }}>DATE: ______________ <span style={{ float: 'right' }}>TIME: 2 HOURS</span></p>
                                        <p style={{ margin: '5px 0' }}>COURSE CODE: {result.courseCode}</p>
                                        <p style={{ margin: '5px 0', textTransform: 'uppercase' }}>COURSE TITLE: {result.examTitle}</p>
                                        <p style={{ margin: '15px 0', fontStyle: 'italic' }}>INSTRUCTIONS: {result.instructions}</p>
                                    </div>
                                    <hr style={{ borderTop: '2px solid black', marginBottom: '20px' }} />

                                    {/* PRINT LOGIC: Read from state so it catches Edits! */}
                                    {result.sections ? (
                                        result.sections.map((section, sIndex) => (
                                            <div key={sIndex} style={{ marginBottom: '30px' }}>
                                                <h3 style={{ fontSize: '16px', fontWeight: 'bold', textTransform: 'uppercase', textAlign: 'center', textDecoration: 'underline' }}>
                                                    {section.sectionName}: {section.compulsory ? 'COMPULSORY' : 'OPTIONAL'}
                                                </h3>
                                                <div style={{ paddingLeft: '15px' }}>
                                                    {section.questions.map((q, qIndex) => (
                                                        <div key={qIndex} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '12px', fontSize: '14px' }}>
                                                            <div style={{ flex: 1, paddingRight: '20px' }}><strong>{q.questionNumber || String.fromCharCode(97 + qIndex)})</strong> {q.questionText}</div>
                                                            <div style={{ fontWeight: 'bold' }}>[{q.marks} marks]</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div style={{ paddingLeft: '15px' }}>
                                            {result.questions && result.questions.map((q, qIndex) => (
                                                <div key={qIndex} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px', fontSize: '14px' }}>
                                                    <div style={{ flex: 1, paddingRight: '20px' }}><strong>{q.questionNumber || qIndex+1}.</strong> {q.questionText}</div>
                                                    <div style={{ fontWeight: 'bold' }}>[{q.marks} marks]</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <div style={{ textAlign: 'center', marginTop: '40px', fontWeight: 'bold' }}>*** END OF EXAMINATION ***</div>
                                </div>

                                {/* ========================================== */}
                                {/* THE VISIBLE DASHBOARD UI (EDITABLE!) */}
                                {/* ========================================== */}
                                <div className="no-print" style={{ marginTop: '30px', padding: '30px', backgroundColor: '#fff', border: '1px solid #ddd', borderRadius: '8px', boxShadow: '0 4px 6px rgba(0,0,0,0.1)' }}>
                                    <div style={{ textAlign: 'center', borderBottom: '2px solid #2c3e50', paddingBottom: '20px', marginBottom: '20px' }}>
                                        <h2 style={{ margin: '0 0 10px 0', color: '#2c3e50', textTransform: 'uppercase' }}>📝 Editable Preview: {result.examTitle}</h2>
                                        <p style={{ fontStyle: 'italic', color: '#7f8c8d', margin: '0' }}>Edits made here will automatically reflect in your PDF download.</p>
                                    </div>

                                    <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '20px' }}>
                                        <button onClick={() => setViewMode(viewMode === 'student' ? 'lecturer' : 'student')} style={{ padding: '10px 20px', backgroundColor: viewMode === 'student' ? '#3498db' : '#9b59b6', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', transition: '0.3s' }}>
                                            👁️ Switch to {viewMode === 'student' ? 'Marking Scheme View' : 'Student Exam View'}
                                        </button>
                                    </div>

                                    {/* SCREEN LOGIC: Editable Sections OR Flat CAT */}
                                    {result.sections ? (
                                        result.sections.map((section, sIndex) => (
                                            <div key={sIndex} style={{ marginBottom: '40px', background: '#fafafa', padding: '15px', border: '1px solid #eee', borderRadius: '6px' }}>
                                                <h3 style={{ borderBottom: '1px solid #bdc3c7', paddingBottom: '10px', display: 'flex', justifyContent: 'space-between' }}>
                                                    <span>{section.sectionName}</span>
                                                </h3>
                                                {section.questions.map((q, qIndex) => (
                                                    <div key={qIndex} style={{ marginBottom: '15px', background: 'white', padding: '15px', border: '1px solid #e0e0e0', borderRadius: '6px' }}>
                                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px' }}>
                                                            
                                                            {/* Editable Question Text */}
                                                            <div style={{ flex: 1 }}>
                                                                <div style={{ fontWeight: 'bold', color: '#003366', marginBottom: '5px' }}>{q.questionNumber || String.fromCharCode(97 + qIndex)})</div>
                                                                <textarea value={q.questionText} onChange={(e) => handleQuestionEdit(sIndex, qIndex, 'questionText', e.target.value)} style={{ width: '100%', padding: '10px', border: '1px solid #ccc', borderRadius: '4px', fontFamily: 'inherit', fontSize: '14px', resize: 'vertical', boxSizing: 'border-box' }} rows="2" />
                                                            </div>
                                                            
                                                            {/* Editable Marks & Delete */}
                                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '5px', width: '90px' }}>
                                                                <div style={{ display: 'flex', alignItems: 'center' }}>
                                                                    <input type="number" value={q.marks} onChange={(e) => handleQuestionEdit(sIndex, qIndex, 'marks', parseInt(e.target.value) || 0)} style={{ width: '50px', padding: '5px', textAlign: 'center', border: '1px solid #ccc' }} />
                                                                    <span style={{ fontSize: '12px', marginLeft: '5px', fontWeight: 'bold' }}>mks</span>
                                                                </div>
                                                                <button onClick={() => handleQuestionDelete(sIndex, qIndex)} style={{ background: '#fadbd8', color: '#c0392b', border: 'none', borderRadius: '4px', padding: '5px', cursor: 'pointer', fontSize: '12px', fontWeight: 'bold' }}>🗑️ Delete</button>
                                                            </div>
                                                        </div>

                                                        {viewMode === 'lecturer' && (
                                                            <div style={{ marginTop: '10px', padding: '10px', backgroundColor: '#fcf3cf', borderLeft: '4px solid #f1c40f', borderRadius: '4px' }}>
                                                                <strong style={{ color: '#d35400', display: 'block', marginBottom: '5px' }}>✔️ Editable Marking Guide:</strong> 
                                                                <textarea value={q.markingGuide} onChange={(e) => handleQuestionEdit(sIndex, qIndex, 'markingGuide', e.target.value)} style={{ width: '100%', padding: '8px', border: '1px solid #f1c40f', borderRadius: '4px', fontFamily: 'inherit', fontSize: '13px', resize: 'vertical', boxSizing: 'border-box', background: '#fff9e6' }} rows="2" />
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                                <button type="button" onClick={() => handleQuestionAdd(sIndex)} style={{ background: 'transparent', border: '2px dashed #bdc3c7', color: '#7f8c8d', padding: '10px', width: '100%', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', transition: '0.2s' }}>
                                                    + Add Blank Question to {section.sectionName}
                                                </button>
                                            </div>
                                        ))
                                    ) : (
                                        <div style={{ marginBottom: '40px', background: '#fafafa', padding: '15px', border: '1px solid #eee', borderRadius: '6px' }}>
                                            {result.questions && result.questions.map((q, qIndex) => (
                                                <div key={qIndex} style={{ marginBottom: '15px', background: 'white', padding: '15px', border: '1px solid #e0e0e0', borderRadius: '6px' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px' }}>
                                                        <div style={{ flex: 1 }}>
                                                            <div style={{ fontWeight: 'bold', color: '#003366', marginBottom: '5px' }}>Question {q.questionNumber || qIndex + 1}.</div>
                                                            <textarea value={q.questionText} onChange={(e) => handleQuestionEdit(null, qIndex, 'questionText', e.target.value)} style={{ width: '100%', padding: '10px', border: '1px solid #ccc', borderRadius: '4px', fontFamily: 'inherit', fontSize: '14px', resize: 'vertical', boxSizing: 'border-box' }} rows="2" />
                                                        </div>
                                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '5px', width: '90px' }}>
                                                            <div style={{ display: 'flex', alignItems: 'center' }}>
                                                                <input type="number" value={q.marks} onChange={(e) => handleQuestionEdit(null, qIndex, 'marks', parseInt(e.target.value) || 0)} style={{ width: '50px', padding: '5px', textAlign: 'center', border: '1px solid #ccc' }} />
                                                                <span style={{ fontSize: '12px', marginLeft: '5px', fontWeight: 'bold' }}>mks</span>
                                                            </div>
                                                            <button onClick={() => handleQuestionDelete(null, qIndex)} style={{ background: '#fadbd8', color: '#c0392b', border: 'none', borderRadius: '4px', padding: '5px', cursor: 'pointer', fontSize: '12px', fontWeight: 'bold' }}>🗑️ Delete</button>
                                                        </div>
                                                    </div>
                                                    {viewMode === 'lecturer' && (
                                                        <div style={{ marginTop: '10px', padding: '10px', backgroundColor: '#fcf3cf', borderLeft: '4px solid #f1c40f', borderRadius: '4px' }}>
                                                            <strong style={{ color: '#d35400', display: 'block', marginBottom: '5px' }}>✔️ Editable Marking Guide:</strong> 
                                                            <textarea value={q.markingGuide} onChange={(e) => handleQuestionEdit(null, qIndex, 'markingGuide', e.target.value)} style={{ width: '100%', padding: '8px', border: '1px solid #f1c40f', borderRadius: '4px', fontFamily: 'inherit', fontSize: '13px', resize: 'vertical', boxSizing: 'border-box', background: '#fff9e6' }} rows="2" />
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                            <button type="button" onClick={() => handleQuestionAdd(null)} style={{ background: 'transparent', border: '2px dashed #bdc3c7', color: '#7f8c8d', padding: '10px', width: '100%', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', transition: '0.2s' }}>
                                                + Add Blank Question
                                            </button>
                                        </div>
                                    )}
                                    
                                    {/* THE NEW SAVE TO DATABASE BUTTON */}
                                    <button type="button" onClick={handleSaveToDatabase} className="btn-primary" style={{ backgroundColor: '#27ae60', color: 'white', marginTop: '20px' }}>
                                        💾 Save Official Exam to Database
                                    </button>

                                </div>
                            </div>
                        )}

                        <div style={{ marginTop: '50px', paddingTop: '20px', borderTop: '3px solid #eee' }}>
                            <h3 style={{ color: '#333', marginBottom: '5px' }}>🗄️ Quiz History Vault</h3>
                            <input type="text" placeholder="🔍 Search by topic or date..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} style={{ width: '100%', padding: '10px', marginBottom: '20px', border: '1px solid #ccc', borderRadius: '4px', boxSizing: 'border-box' }} />
                            <div style={{ overflowX: 'auto' }}>
                                <table>
                                    <thead><tr><th>Date</th><th>Topic / Source File</th><th>Details</th></tr></thead>
                                    <tbody>
                                        {filteredHistory.length > 0 ? (
                                            filteredHistory.map(item => (
                                                <tr key={item.id}>
                                                    <td style={{ fontWeight: '500' }}>{item.date}</td>
                                                    <td style={{ color: '#003366', fontWeight: 'bold' }}>{item.topic}</td>
                                                    <td>{item.count} Marks ({item.type})</td>
                                                </tr>
                                            ))
                                        ) : (
                                            <tr><td colSpan="3" style={{ textAlign: 'center', color: '#999' }}>No saved quizzes found.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
